<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TBOY Store - Dịch Vụ Game - Robux</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    background:#2563eb;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.shop{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:30px;
}

.card{
    background:#1e293b;
    padding:20px;
    margin:15px;
    width:220px;
    border-radius:10px;
}

.card h3{
    color:#38bdf8;
}

button{
    background:#22c55e;
    border:none;
    padding:10px 20px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

footer{
    margin-top:40px;
    padding:20px;
    background:#020617;
}
</style>

</head>

<body>

<header>
🛒 TBOY STORE - DỊCH VỤ GAME
</header>

<h2>Dịch vụ Roblox / Blox Fruit</h2>

<div class="shop">

<div class="card">
<h3>100 Robux</h3>
<p>Giá: 20.000đ</p>
<button onclick="buy()">Mua ngay</button>
</div>

<div class="card">
<h3>500 Robux</h3>
<p>Giá: 90.000đ</p>
<button onclick="buy()">Mua ngay</button>
</div>

<div class="card">
<h3>10M Beli</h3>
<p>Giá: 10.000đ</p>
<button onclick="buy()">Mua ngay</button>
</div>

<div class="card">
<h3>Ghoul Race</h3>
<p>Giá: 10.000đ</p>
<button onclick="buy()">Mua ngay</button>
</div>

</div>

<footer>
📩 Liên hệ Discord: NStore#0001 <br>
💬 Zalo: 0123456789
</footer>

<script>
function buy(){
alert("Liên hệ Discord hoặc Zalo để mua nhé!");
}
</script>

</body>
</html>
